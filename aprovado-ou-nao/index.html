4<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Notas</title>
    <style>
        /* Estilização da página (CSS) */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .cartao {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 100%;
            max-width: 350px;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
        }

        input[type="number"] {
            width: 80%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        #resultado {
            margin-top: 20px;
            font-weight: bold;
            font-size: 18px;
            min-height: 24px; /* Mantém o espaço mesmo vazio */
        }
    </style>
</head>
<body>

    <div class="cartao">
        <h2>Verificador de Notas</h2>
        
        <input type="number" id="notaInput" placeholder="Digite a nota (0 a 10)" step="0.1" min="0" max="10">
        <br>
        <button onclick="verificarNota()">Verificar Resultado</button>

        <p id="resultado"></p>
    </div>

    <script>
        // Lógica de verificação (JavaScript)
        function verificarNota() {
            // Pega o valor digitado no input e converte para número
            let input = document.getElementById("notaInput").value;
            let nota = parseFloat(input);
            let elementoResultado = document.getElementById("resultado");

            // Limpa o resultado se o campo estiver vazio
            if (isNaN(nota)) {
                elementoResultado.innerText = "Por favor, digite um número válido.";
                elementoResultado.style.color = "#333";
                return;
            }

            // Validação de intervalo
            if (nota < 0 || nota > 10) {
                elementoResultado.innerText = "Nota inválida. Insira um valor entre 0 e 10.";
                elementoResultado.style.color = "#dc3545"; // Vermelho
                return;
            }

            // Verificações de aprovação com mudança de cor dinâmica
            if (nota === 10) {
                elementoResultado.innerText = "Aprovado com louvor! Um 10 perfeito, parabéns pela dedicação! 🏆";
                elementoResultado.style.color = "#d4af37"; // Dourado
            } 
            else if (nota >= 7) {
                elementoResultado.innerText = "Aprovado! Parabéns pelo bom resultado. ✅";
                elementoResultado.style.color = "#28a745"; // Verde
            } 
            else if (nota >= 4) {
                elementoResultado.innerText = "Em recuperação. Você ainda tem chance, revise o conteúdo! 📚";
                elementoResultado.style.color = "#fd7e14"; // Laranja
            } 
            else {
                elementoResultado.innerText = "Reprovado. Não desanime, use como aprendizado. ❌";
                elementoResultado.style.color = "#dc3545"; // Vermelho
            }
        }
    </script>

</body>
</html>
